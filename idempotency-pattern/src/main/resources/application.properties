spring.application.name=idempotency-pattern

server.port=8081

spring.datasource.url=jdbc:h2:mem:idempotencydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=loyalty-points-demo
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.listener.missing-topics-fatal=false

app.kafka.order-topic=order-placed-events
app.loyalty.idempotency-enabled=true

logging.level.org.apache.kafka=INFO
logging.level.com.example.idempotency=INFO
