spring:
  application:
    name: retry-topic-dlq-pattern
  datasource:
    url: jdbc:h2:mem:retrydlqdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  kafka:
    bootstrap-servers: localhost:9092
    listener:
      missing-topics-fatal: false
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: org.example.retrydlq.dto
        spring.json.value.default.type: org.example.retrydlq.dto.OrderPlacedEvent
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

server:
  port: 8082

app:
  retry:
    max-attempts: 3
  processing:
    fail-enabled: false
  topics:
    main: order-events
    retry: order-events-retry
    dlq: order-events-dlq

logging:
  level:
    org.example.retrydlq: INFO
    org.apache.kafka: INFO
